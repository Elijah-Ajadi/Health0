services:
  - type: web
    name: health0-backend
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn health0.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: health0-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: INTERSWITCH_CLIENT_ID
        sync: false
      - key: INTERSWITCH_CLIENT_SECRET
        sync: false

databases:
  - name: health0-db
    databaseName: health0
    user: health0_user
    plan: free
